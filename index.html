<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Dashboard Psicóloga</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Psicóloga"/>
<link rel="apple-touch-icon" href="icon.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
body{background:#f5f3ff;min-height:100vh;padding-bottom:72px}
:root{--p:#3C3489;--pm:#7F77DD;--pb:#EEEDFE;--pbr:#AFA9EC;--g:#1a7a4a;--r:#c0392b}
.page{display:none;padding:20px 16px 0}.page.active{display:block}
nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--pbr);display:flex;z-index:100}
nav button{flex:1;border:none;background:none;padding:10px 0 6px;color:#999;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;font-size:10px}
nav button.active{color:var(--p);font-weight:600}
nav button .ic{font-size:18px}
.card{background:#fff;border:.5px solid var(--pbr);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.card.lilac{background:var(--pb)}
.sec{font-size:12px;font-weight:600;color:var(--p);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.page-title{font-size:18px;font-weight:600;color:var(--p)}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.btn-primary{background:var(--p);color:#fff;border:none;border-radius:20px;padding:6px 16px;font-size:13px;cursor:pointer;white-space:nowrap}
.btn-sm{border:.5px solid var(--pbr);background:none;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;color:var(--p)}
.btn-edit{border:none;background:#e8e6ff;color:var(--p);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;font-weight:500}
.btn-confirm{border:none;background:#e6f9ef;color:var(--g);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:600}
.btn-unconfirm{border:none;background:#fce8e8;color:var(--r);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric{background:var(--pb);border-radius:12px;padding:12px 14px}
.metric .lbl{font-size:11px;color:var(--pm);margin-bottom:4px}
.metric .val{font-size:17px;font-weight:600;color:var(--p)}
input,select{width:100%;border:1px solid var(--pbr);border-radius:8px;padding:8px 10px;font-size:14px;background:#fff;outline:none}
input:focus,select:focus{border-color:var(--pm)}
.field{margin-bottom:10px;position:relative}
.field label{font-size:12px;color:var(--pm);display:block;margin-bottom:4px}
.btn-full{width:100%;background:var(--p);color:#fff;border:none;border-radius:8px;padding:10px;font-size:14px;cursor:pointer;margin-top:4px}
.btn-full.secondary{background:#fff;color:var(--p);border:1px solid var(--pbr)}
.pill{background:var(--pb);color:var(--p);font-size:11px;padding:2px 8px;border-radius:20px;border:.5px solid var(--pbr);display:inline-block;margin:2px 2px 0 0}
.pill.green{background:#e6f9ef;color:var(--g);border-color:#9fe1cb}
.pill.red{background:#fce8e8;color:var(--r);border-color:#f09595}
.pill.blue{background:#e6f1fb;color:#185fa5;border-color:#85b7eb}
.pill.orange{background:#fff3e0;color:#e65100;border-color:#ffcc80}
.del-btn{border:none;background:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 2px;flex-shrink:0}
.green{color:var(--g)}.red{color:var(--r)}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--pbr);border-radius:8px;z-index:200;max-height:160px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.autocomplete-item{padding:9px 12px;font-size:14px;cursor:pointer;color:var(--p)}
.autocomplete-item:hover{background:var(--pb)}
.day-nav{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.day-nav button{border:.5px solid var(--pbr);background:none;border-radius:8px;padding:4px 14px;cursor:pointer;color:var(--p);font-size:18px;line-height:1}
.day-nav .day-info{flex:1;text-align:center}
.day-nav .day-name{font-size:16px;font-weight:600;color:var(--p)}
.day-nav .day-date{font-size:12px;color:var(--pm)}
.hour-slot{display:flex;align-items:flex-start;min-height:52px;border-bottom:.5px solid #f0eeff;padding:4px 0}
.hour-slot:last-child{border-bottom:none}
.hour-label{font-size:11px;color:var(--pm);min-width:40px;padding-top:2px;flex-shrink:0}
.hour-content{flex:1;padding-left:8px}
.appt-card{background:#fff;border:.5px solid var(--pbr);border-radius:12px;margin-bottom:6px;overflow:hidden}
.appt-header{background:var(--pb);padding:8px 12px;display:flex;align-items:center;gap:10px}
.appt-time{background:var(--p);color:#fff;border-radius:6px;padding:4px 10px;font-size:13px;font-weight:600;min-width:48px;text-align:center}
.appt-patient{font-size:15px;font-weight:600;color:var(--p);flex:1}
.appt-body{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.appt-actions{display:flex;gap:6px;align-items:center}
.period-filter{display:flex;gap:8px;margin-bottom:14px}
.period-filter select{flex:1;padding:7px 10px;font-size:13px}
.month-selector{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.month-selector select{flex:1;border:.5px solid var(--pbr);border-radius:8px;padding:6px 10px;font-size:13px;background:#fff}
.month-selector button{border:.5px solid var(--pbr);background:none;border-radius:8px;padding:4px 12px;cursor:pointer;color:var(--p);font-size:16px}
.report-patient{background:#fff;border:.5px solid var(--pbr);border-radius:12px;margin-bottom:10px;overflow:hidden}
.report-header{background:var(--pb);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.report-body{padding:10px 14px;border-top:.5px solid var(--pbr)}
.session-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:.5px solid #f0eeff;color:var(--p)}
.session-row:last-child{border:none}
#login-screen{position:fixed;inset:0;background:var(--pb);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:20px;padding:32px}
#login-screen h1{font-size:24px;font-weight:700;color:var(--p);text-align:center}
#login-screen p{font-size:14px;color:var(--pm);text-align:center}
.btn-google{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--pbr);border-radius:12px;padding:12px 24px;font-size:15px;font-weight:500;color:#333;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.btn-google img{width:22px;height:22px}
#access-denied{position:fixed;inset:0;background:var(--pb);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;padding:32px}
#access-denied h2{font-size:20px;font-weight:700;color:var(--r);text-align:center}
#loading{position:fixed;inset:0;background:var(--pb);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:998;gap:12px}
#loading .spinner{width:36px;height:36px;border:3px solid var(--pbr);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* room rent field */
.rent-box{background:#fff3e0;border:.5px solid #ffcc80;border-radius:10px;padding:10px 12px;margin-top:8px}
.rent-box label{font-size:12px;color:#e65100;display:block;margin-bottom:4px;font-weight:500}
</style>
</head>
<body>

<div id="login-screen">
  <div style="font-size:48px">💜</div>
  <h1>Dashboard Psicóloga</h1>
  <p>Faça login para acessar</p>
  <button class="btn-google" onclick="doLogin()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"/>
    Entrar com Google
  </button>
</div>

<div id="access-denied" style="display:none">
  <div style="font-size:48px">🔒</div>
  <h2>Acesso não autorizado</h2>
  <p>Este e-mail não tem permissão para acessar o sistema.</p>
  <button class="btn-google" onclick="doLogout()">Sair e tentar outro e-mail</button>
</div>

<div id="loading"><div class="spinner"></div><div style="color:var(--p);font-size:14px">Carregando dados...</div></div>

<!-- HOME -->

<div id="home" class="page">
  <div style="margin-bottom:12px">
    <div style="font-size:22px;font-weight:600;color:var(--p)">Olá! 👋</div>
    <div id="user-email" style="font-size:12px;color:var(--pm);margin-top:2px"></div>
  </div>
  <div class="month-selector">
    <button onclick="changeHomeMonth(-1)">‹</button>
    <select id="home-month-sel" onchange="renderHome()"></select>
    <button onclick="changeHomeMonth(1)">›</button>
  </div>
  <div class="grid2" id="home-metrics"></div>
  <div class="sec">Hoje</div>
  <div id="home-today"></div>
  <div class="sec" id="home-week-title" style="margin-top:4px">Esta semana</div>
  <div class="card" id="home-week"></div>
  <div style="margin-top:8px;text-align:center">
    <button onclick="doLogout()" style="border:none;background:none;color:#bbb;font-size:12px;cursor:pointer">Sair da conta</button>
  </div>
</div>

<!-- PATIENTS -->

<div id="patients" class="page">
  <div class="row">
    <div class="page-title">Pacientes</div>
    <button class="btn-primary" onclick="openPatientForm(null)">+ Novo</button>
  </div>
  <!-- Patient form -->
  <div id="pform" style="display:none">
    <div class="card lilac">
      <div style="font-size:13px;font-weight:600;color:var(--p);margin-bottom:12px" id="pform-title">Novo paciente</div>
      <input type="hidden" id="p-edit-id"/>
      <div class="field"><label>Nome completo</label><input id="p-name" placeholder="Nome da paciente"/></div>
      <div class="field"><label>Telefone</label><input id="p-phone" type="tel" placeholder="(51) 9..."/></div>
      <div class="field"><label>Tipo de atendimento</label>
        <select id="p-type" onchange="togglePatientType()">
          <option value="recorrente">Psicoterapia (recorrente)</option>
          <option value="avaliacao">Avaliação Neuropsicológica (pontual)</option>
        </select>
      </div>
      <div id="p-recorrente-fields">
        <div class="field"><label>Valor da sessão (R$)</label><input id="p-value" type="number" placeholder="200"/></div>
        <div class="field"><label>Sessões por mês</label>
          <select id="p-freq"><option value="1">1x/mês</option><option value="2">2x/mês</option><option value="4" selected>4x/mês</option><option value="8">8x/mês</option></select>
        </div>
      </div>
      <div id="p-avaliacao-fields" style="display:none">
        <div class="field"><label>Valor total da avaliação (R$)</label><input id="p-value-av" type="number" placeholder="1500"/></div>
      </div>
      <button class="btn-full" id="pform-btn" onclick="savePatient()">Cadastrar paciente</button>
      <button class="btn-full secondary" style="margin-top:6px" onclick="closePatientForm()">Cancelar</button>
    </div>
  </div>
  <div id="patients-list"></div>
</div>

<!-- AGENDA -->

<div id="agenda" class="page">
  <div class="row">
    <div class="page-title">Agenda</div>
    <button class="btn-primary" onclick="toggleForm('aform')">+ Agendar</button>
  </div>
  <div id="aform" style="display:none">
    <div class="card lilac">
      <div class="field">
        <label>Paciente</label>
        <input id="a-patient" placeholder="Digite o nome..." autocomplete="off" oninput="filterPatients()" onblur="hideAC()"/>
        <div class="autocomplete-list" id="ac-list" style="display:none"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field"><label>Tipo</label>
          <select id="a-type"><option value="Psicoterapia">Psicoterapia</option><option value="Avaliação Neuropsicológica">Avaliação Neuro.</option></select>
        </div>
        <div class="field"><label>Modalidade</label>
          <select id="a-mode" onchange="toggleRoomField()">
            <option value="Presencial NH">Presencial NH</option>
            <option value="Presencial POA">Presencial POA</option>
            <option value="Virtual">Virtual</option>
          </select>
        </div>
      </div>
      <!-- Room rent -->
      <div id="rent-field" class="rent-box">
        <label>Aluguel da sala (R$) — opcional</label>
        <input id="a-rent" type="number" placeholder="0" style="background:#fff3e0;border-color:#ffcc80"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
        <div class="field"><label>Data</label><input id="a-date" type="date"/></div>
        <div class="field"><label>Horário</label><input id="a-time" type="time" value="09:00"/></div>
      </div>
      <div class="field"><label>Observações</label><input id="a-notes" placeholder="Opcional"/></div>
      <button class="btn-full" onclick="saveAppt()">Confirmar agendamento</button>
    </div>
  </div>
  <div class="day-nav">
    <button onclick="changeDay(-1)">‹</button>
    <div class="day-info">
      <div class="day-name" id="day-name"></div>
      <div class="day-date" id="day-date"></div>
    </div>
    <button onclick="changeDay(1)">›</button>
  </div>
  <div id="agenda-list"></div>
</div>

<!-- EXPENSES -->

<div id="expenses" class="page">
  <div class="row">
    <div class="page-title">Despesas</div>
    <button class="btn-primary" onclick="toggleForm('eform')">+ Registrar</button>
  </div>
  <div id="eform" style="display:none">
    <div class="card lilac">
      <div class="field"><label>Descrição</label><input id="e-desc" placeholder="Ex: Aluguel sala"/></div>
      <div class="field"><label>Categoria</label>
        <select id="e-cat"><option>Aluguel de sala NH</option><option>Aluguel de sala POA</option><option>Material</option><option>Supervisão</option><option>Curso/formação</option><option>Transporte</option><option>Outros</option></select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field"><label>Data</label><input id="e-date" type="date"/></div>
        <div class="field"><label>Valor (R$)</label><input id="e-value" type="number" placeholder="0"/></div>
      </div>
      <button class="btn-full" onclick="saveExpense()">Salvar despesa</button>
    </div>
  </div>
  <div class="period-filter">
    <select id="e-filter-month" onchange="renderExpenses()"></select>
    <select id="e-filter-year" onchange="renderExpenses()" style="max-width:90px"></select>
  </div>
  <div class="card lilac" id="exp-summary"></div>
  <div id="expenses-list" style="margin-top:12px"></div>
</div>

<!-- REPORTS -->

<div id="reports" class="page">
  <div class="row"><div class="page-title">Relatórios</div></div>
  <div class="period-filter">
    <select id="r-filter-month" onchange="renderReports()"></select>
    <select id="r-filter-year" onchange="renderReports()" style="max-width:90px"></select>
  </div>
  <div class="card lilac" id="report-summary" style="margin-bottom:16px"></div>
  <div class="sec">Sessões por paciente</div>
  <div id="report-list"></div>
</div>

<nav id="main-nav" style="display:none">
  <button class="active" onclick="goTo('home')" id="nav-home"><span class="ic">⊞</span>Início</button>
  <button onclick="goTo('patients')" id="nav-patients"><span class="ic">♡</span>Pacientes</button>
  <button onclick="goTo('agenda')" id="nav-agenda"><span class="ic">◷</span>Agenda</button>
  <button onclick="goTo('expenses')" id="nav-expenses"><span class="ic">◈</span>Despesas</button>
  <button onclick="goTo('reports')" id="nav-reports"><span class="ic">↗</span>Relatórios</button>
</nav>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,doc,getDocs,addDoc,updateDoc,deleteDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const ALLOWED_EMAILS=["santiagohenkel@gmail.com","henkeldaniela1972@gmail.com"];
const firebaseConfig={apiKey:"AIzaSyCo6cxpKO4j4ToYppkGV7gJnzc1RE-2mW8",authDomain:"dashboard-psicologa.firebaseapp.com",projectId:"dashboard-psicologa",storageBucket:"dashboard-psicologa.firebasestorage.app",messagingSenderId:"776138856103",appId:"1:776138856103:web:7ce3b769b993b1ef69ad82"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();

const MONTHS=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const WDAYS=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
const HOURS=Array.from({length:15},(_,i)=>i+7);
const now=new Date();
let dayOffset=0,homeMonth=now.getMonth(),homeYear=now.getFullYear();
let DB={patients:[],appts:[],expenses:[]};

function fmt(n){return Number(n).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function dateStr(d){const z=s=>String(s).padStart(2,"0");return`${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`}
function currentDay(){const d=new Date(now);d.setDate(d.getDate()+dayOffset);return d}
function showLoading(){document.getElementById("loading").style.display="flex";}
function hideLoading(){document.getElementById("loading").style.display="none";}

window.doLogin=async function(){try{await signInWithPopup(auth,provider);}catch(e){alert("Erro ao fazer login.");}}
window.doLogout=async function(){
  await signOut(auth);
  document.getElementById("access-denied").style.display="none";
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("main-nav").style.display="none";
  document.getElementById("login-screen").style.display="flex";
}

onAuthStateChanged(auth,async user=>{
  if(!user){document.getElementById("login-screen").style.display="flex";return;}
  if(!ALLOWED_EMAILS.map(e=>e.toLowerCase()).includes(user.email.toLowerCase())){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("access-denied").style.display="flex";return;
  }
  document.getElementById("login-screen").style.display="none";
  showLoading();
  document.getElementById("user-email").textContent=user.email;
  await loadAll();
  hideLoading();
  document.getElementById("main-nav").style.display="flex";
  document.getElementById("home").classList.add("active");
});

async function loadAll(){
  for(const c of["patients","appts","expenses"]){
    const snap=await getDocs(collection(db,c));
    DB[c]=snap.docs.map(d=>({...d.data(),_id:d.id}));
  }
  initHomeMonthSel();renderHome();
}
async function addDoc2(col,data){const ref=await addDoc(collection(db,col),data);DB[col].push({...data,_id:ref.id});return ref.id;}
async function updateDoc2(col,id,data){await updateDoc(doc(db,col,id),data);const i=DB[col].findIndex(x=>x._id===id);if(i>=0)DB[col][i]={...DB[col][i],...data};}
async function deleteDoc2(col,id){await deleteDoc(doc(db,col,id));DB[col]=DB[col].filter(x=>x._id!==id);}

function initHomeMonthSel(){
  const sel=document.getElementById("home-month-sel");if(sel.options.length)return;
  for(let y=now.getFullYear()-1;y<=now.getFullYear()+1;y++){MONTHS.forEach((m,i)=>{const o=document.createElement("option");o.value=y+"-"+i;o.textContent=m+" "+y;if(i===now.getMonth()&&y===now.getFullYear())o.selected=true;sel.appendChild(o);});}
}
window.changeHomeMonth=function(d){homeMonth+=d;if(homeMonth>11){homeMonth=0;homeYear++;}if(homeMonth<0){homeMonth=11;homeYear--;}document.getElementById("home-month-sel").value=homeYear+"-"+homeMonth;renderHome();}

window.goTo=function(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById(page).classList.add("active");
  document.getElementById("nav-"+page).classList.add("active");
  if(page==="home")renderHome();
  if(page==="patients")renderPatients();
  if(page==="agenda")renderAgenda();
  if(page==="expenses")renderExpenses();
  if(page==="reports")renderReports();
}
window.toggleForm=function(id){const f=document.getElementById(id);f.style.display=f.style.display==="none"?"block":"none";}

// HOME
function renderHome(){
  const sel=document.getElementById("home-month-sel");
  if(sel.value){const p=sel.value.split("-");homeYear=Number(p[0]);homeMonth=Number(p[1]);}
  const m=homeMonth,y=homeYear;
  const active=DB.patients.filter(p=>p.active);
  const confirmedRev=DB.appts.filter(a=>{const d=new Date(a.date+"T12:00:00");return a.confirmed&&d.getMonth()===m&&d.getFullYear()===y}).reduce((s,a)=>s+Number(a.value||0),0);
  const expectedRev=active.filter(p=>p.type!=="avaliacao").reduce((s,p)=>s+Number(p.value)*(p.freq||4),0);
  const monthExp=DB.expenses.filter(e=>{const d=new Date(e.date+"T12:00:00");return d.getMonth()===m&&d.getFullYear()===y}).reduce((s,e)=>s+Number(e.value),0);
  const net=confirmedRev-monthExp;
  document.getElementById("home-metrics").innerHTML=`
    <div class="metric"><div class="lbl">Realizado no mês</div><div class="val green">${fmt(confirmedRev)}</div></div>
    <div class="metric"><div class="lbl">Esperado no mês</div><div class="val">${fmt(expectedRev)}</div></div>
    <div class="metric"><div class="lbl">Despesas do mês</div><div class="val red">${fmt(monthExp)}</div></div>
    <div class="metric"><div class="lbl">Resultado líquido</div><div class="val ${net>=0?"green":"red"}">${fmt(net)}</div></div>`;
  const todayStr=dateStr(now);
  const todayA=DB.appts.filter(a=>a.date===todayStr).sort((a,b)=>a.time.localeCompare(b.time));
  document.getElementById("home-today").innerHTML=!todayA.length
    ?'<div class="card"><div style="color:#aaa;font-size:14px;text-align:center;padding:4px 0">Sem atendimentos hoje</div></div>'
    :todayA.map(a=>`<div class="appt-card">
      <div class="appt-header"><div class="appt-time">${a.time}</div><div class="appt-patient">${a.patient}</div>${a.confirmed?'<span class="pill green">✓ Realizada</span>':''}</div>
      <div class="appt-body"><span style="font-size:12px;color:var(--pm)">${a.type||"Psicoterapia"} · ${a.mode||""}</span><span style="font-size:13px;font-weight:600;color:var(--p)">${a.value?fmt(a.value):""}</span></div>
    </div>`).join("");
  const ws=new Date(now);ws.setDate(ws.getDate()-ws.getDay());
  const we=new Date(ws);we.setDate(ws.getDate()+6);
  const weekA=DB.appts.filter(a=>{const d=new Date(a.date+"T12:00:00");return d>=ws&&d<=we});
  document.getElementById("home-week-title").textContent=`Esta semana (${weekA.length} agendado${weekA.length!==1?"s":""})`;
  if(!weekA.length){document.getElementById("home-week").innerHTML='<div style="color:#aaa;font-size:14px;text-align:center;padding:4px 0">Nenhum atendimento</div>';return;}
  const byDay={};weekA.forEach(a=>{if(!byDay[a.date])byDay[a.date]=[];byDay[a.date].push(a);});
  document.getElementById("home-week").innerHTML=Object.keys(byDay).sort().map(date=>{
    const d=new Date(date+"T12:00:00");
    return`<div style="margin-bottom:8px"><div style="font-size:12px;color:var(--pm);font-weight:600;margin-bottom:4px">${WDAYS[d.getDay()].slice(0,3)} ${d.getDate()}/${d.getMonth()+1}</div>
    ${byDay[date].sort((a,b)=>a.time.localeCompare(b.time)).map(a=>`<div style="display:flex;gap:8px;font-size:13px;color:var(--p);margin-bottom:2px;align-items:center">
      <span style="color:var(--pm);min-width:38px">${a.time}</span><span style="flex:1">${a.patient}</span>${a.confirmed?'<span style="font-size:10px;color:var(--g)">✓</span>':''}
    </div>`).join("")}</div>`;
  }).join("");
}

// PATIENTS — with edit
window.togglePatientType=function(){
  const t=document.getElementById("p-type").value;
  document.getElementById("p-recorrente-fields").style.display=t==="recorrente"?"block":"none";
  document.getElementById("p-avaliacao-fields").style.display=t==="avaliacao"?"block":"none";
}
window.openPatientForm=function(id){
  document.getElementById("pform").style.display="block";
  document.getElementById("p-edit-id").value=id||"";
  if(id){
    const p=DB.patients.find(x=>x._id===id);if(!p)return;
    document.getElementById("pform-title").textContent="Editar paciente";
    document.getElementById("pform-btn").textContent="Salvar alterações";
    document.getElementById("p-name").value=p.name||"";
    document.getElementById("p-phone").value=p.phone||"";
    document.getElementById("p-type").value=p.type||"recorrente";
    togglePatientType();
    if(p.type==="avaliacao"){document.getElementById("p-value-av").value=p.value||"";}
    else{document.getElementById("p-value").value=p.value||"";document.getElementById("p-freq").value=p.freq||4;}
  } else {
    document.getElementById("pform-title").textContent="Novo paciente";
    document.getElementById("pform-btn").textContent="Cadastrar paciente";
    document.getElementById("p-name").value="";document.getElementById("p-phone").value="";
    document.getElementById("p-value").value="";document.getElementById("p-value-av").value="";
    document.getElementById("p-type").value="recorrente";togglePatientType();
  }
  document.getElementById("pform").scrollIntoView({behavior:"smooth"});
}
window.closePatientForm=function(){document.getElementById("pform").style.display="none";}
window.savePatient=async function(){
  const name=document.getElementById("p-name").value.trim();
  if(!name){alert("Informe o nome.");return;}
  const type=document.getElementById("p-type").value;
  const value=type==="avaliacao"?document.getElementById("p-value-av").value:document.getElementById("p-value").value;
  if(!value){alert("Informe o valor.");return;}
  const freq=type==="avaliacao"?1:Number(document.getElementById("p-freq").value);
  const editId=document.getElementById("p-edit-id").value;
  const data={name,phone:document.getElementById("p-phone").value,type,value:Number(value),freq};
  if(editId){
    await updateDoc2("patients",editId,data);
  } else {
    await addDoc2("patients",{...data,active:true});
  }
  closePatientForm();renderPatients();
}
window.toggleActive=async function(id){const p=DB.patients.find(x=>x._id===id);if(!p)return;await updateDoc2("patients",id,{active:!p.active});renderPatients();}
window.delPatient=async function(id){if(!confirm("Remover paciente?"))return;await deleteDoc2("patients",id);renderPatients();}
function renderPatients(){
  const el=document.getElementById("patients-list");
  if(!DB.patients.length){el.innerHTML='<div style="color:#aaa;text-align:center;padding:32px">Nenhum paciente cadastrado</div>';return;}
  el.innerHTML=DB.patients.map(p=>`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:15px;color:var(--p)">${p.name}</div>
        ${p.phone?`<div style="font-size:12px;color:#999;margin-top:2px">${p.phone}</div>`:""}
        <div style="margin-top:6px">
          <span class="pill">${p.type==="avaliacao"?"Avaliação Neuropsicológica":"Psicoterapia"}</span>
          <span class="pill">${fmt(p.value)}${p.type==="avaliacao"?" (pontual)":"/sessão"}</span>
          ${p.type!=="avaliacao"?`<span class="pill">${p.freq}x/mês</span>`:""}
          <span class="pill ${p.active?"green":"red"}">${p.active?"Ativo":"Inativo"}</span>
        </div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0;flex-direction:column;align-items:flex-end">
        <button class="btn-edit" onclick="openPatientForm('${p._id}')">✏️ Editar</button>
        <button class="btn-sm" onclick="toggleActive('${p._id}')">${p.active?"Inativar":"Ativar"}</button>
        <button class="btn-sm" style="color:var(--r)" onclick="delPatient('${p._id}')">Remover</button>
      </div>
    </div>
  </div>`).join("");
}

// AGENDA
window.toggleRoomField=function(){
  const mode=document.getElementById("a-mode").value;
  document.getElementById("rent-field").style.display=mode==="Virtual"?"none":"block";
}
window.filterPatients=function(){
  const val=document.getElementById("a-patient").value.toLowerCase();
  const matches=DB.patients.filter(p=>p.active&&p.name.toLowerCase().includes(val));
  const ac=document.getElementById("ac-list");
  if(!val||!matches.length){ac.style.display="none";return;}
  ac.style.display="block";
  ac.innerHTML=matches.map(p=>`<div class="autocomplete-item" onmousedown="selectPatient('${p.name.replace(/'/g,"\\'")}',${p.value},'${p.type}')">${p.name} <span style="color:var(--pm);font-size:12px">${fmt(p.value)}</span></div>`).join("");
}
window.selectPatient=function(name,value,type){
  document.getElementById("a-patient").value=name;
  document.getElementById("a-type").value=type==="avaliacao"?"Avaliação Neuropsicológica":"Psicoterapia";
  document.getElementById("ac-list").style.display="none";
  document.getElementById("a-patient").dataset.value=value;
}
window.hideAC=function(){setTimeout(()=>{document.getElementById("ac-list").style.display="none"},150)}
window.changeDay=function(d){dayOffset+=d;renderAgenda();}

function modeColor(mode){
  if(!mode)return"";
  if(mode==="Virtual")return"blue";
  if(mode.includes("POA"))return"orange";
  return"";
}

function renderAgenda(){
  const d=currentDay();const ds=dateStr(d);const isToday=ds===dateStr(now);
  document.getElementById("day-name").textContent=isToday?"Hoje — "+WDAYS[d.getDay()]:WDAYS[d.getDay()];
  document.getElementById("day-date").textContent=`${d.getDate()} de ${MONTHS[d.getMonth()]} de ${d.getFullYear()}`;
  const appts=DB.appts.filter(a=>a.date===ds);
  const byHour={};appts.forEach(a=>{const h=parseInt(a.time.split(":")[0]);if(!byHour[h])byHour[h]=[];byHour[h].push(a);});
  document.getElementById("agenda-list").innerHTML=HOURS.map(h=>{
    const slots=(byHour[h]||[]).sort((a,b)=>a.time.localeCompare(b.time));
    return`<div class="hour-slot">
      <div class="hour-label">${String(h).padStart(2,"0")}:00</div>
      <div class="hour-content">${slots.map(a=>`<div class="appt-card">
        <div class="appt-header">
          <div class="appt-time">${a.time}</div>
          <div class="appt-patient">${a.patient}</div>
          ${a.confirmed?'<span class="pill green">✓ Realizada</span>':''}
        </div>
        <div class="appt-body">
          <div>
            <div style="font-size:12px;color:var(--pm)">${a.type||"Psicoterapia"}</div>
            ${a.mode?`<div style="margin-top:2px"><span class="pill ${modeColor(a.mode)}">${a.mode}</span></div>`:""}
            ${a.rent?`<div style="font-size:11px;color:#e65100;margin-top:2px">Sala: ${fmt(a.rent)}</div>`:""}
            ${a.notes?`<div style="font-size:11px;color:#aaa;margin-top:2px">${a.notes}</div>`:""}
          </div>
          <div style="text-align:right">
            <div style="font-size:13px;font-weight:600;color:var(--p)">${a.value?fmt(a.value):""}</div>
            <div class="appt-actions" style="margin-top:4px">
              ${!a.confirmed
                ?`<button class="btn-confirm" onclick="confirmAppt('${a._id}')">✓ Confirmar</button>`
                :`<button class="btn-unconfirm" onclick="unconfirmAppt('${a._id}')">↩ Desfazer</button>`}
              <button class="del-btn" onclick="delAppt('${a._id}')">×</button>
            </div>
          </div>
        </div>
      </div>`).join("")}</div>
    </div>`;
  }).join("");
}

window.saveAppt=async function(){
  const patient=document.getElementById("a-patient").value.trim();
  const date=document.getElementById("a-date").value;
  const time=document.getElementById("a-time").value;
  if(!patient||!date||!time){alert("Preencha paciente, data e horário.");return;}
  const pat=DB.patients.find(p=>p.name.toLowerCase()===patient.toLowerCase());
  const value=pat?pat.value:Number(document.getElementById("a-patient").dataset.value||0);
  const mode=document.getElementById("a-mode").value;
  const rent=mode!=="Virtual"?Number(document.getElementById("a-rent").value||0):0;
  await addDoc2("appts",{patient,date,time,type:document.getElementById("a-type").value,mode,notes:document.getElementById("a-notes").value,value:Number(value),rent,confirmed:false});
  // Auto-add rent as expense
  if(rent>0){
    const cat=mode.includes("POA")?"Aluguel de sala POA":"Aluguel de sala NH";
    await addDoc2("expenses",{desc:`Aluguel sala — ${patient}`,cat,date,value:rent});
  }
  document.getElementById("a-patient").value="";document.getElementById("a-notes").value="";
  document.getElementById("a-rent").value="";document.getElementById("a-patient").dataset.value="";
  toggleForm("aform");renderAgenda();
}
window.confirmAppt=async function(id){await updateDoc2("appts",id,{confirmed:true});renderAgenda();}
window.unconfirmAppt=async function(id){if(!confirm("Desfazer confirmação desta sessão?"))return;await updateDoc2("appts",id,{confirmed:false});renderAgenda();}
window.delAppt=async function(id){if(!confirm("Remover agendamento?"))return;await deleteDoc2("appts",id);renderAgenda();}

// EXPENSES
function initFilters(mId,yId){
  const ms=document.getElementById(mId),ys=document.getElementById(yId);if(ms.options.length)return;
  MONTHS.forEach((m,i)=>{const o=document.createElement("option");o.value=i;o.textContent=m;if(i===now.getMonth())o.selected=true;ms.appendChild(o);});
  [now.getFullYear()-1,now.getFullYear(),now.getFullYear()+1].forEach(y=>{const o=document.createElement("option");o.value=y;o.textContent=y;if(y===now.getFullYear())o.selected=true;ys.appendChild(o);});
}
function renderExpenses(){
  initFilters("e-filter-month","e-filter-year");
  const m=Number(document.getElementById("e-filter-month").value);
  const y=Number(document.getElementById("e-filter-year").value);
  const filtered=DB.expenses.filter(e=>{const d=new Date(e.date+"T12:00:00");return d.getMonth()===m&&d.getFullYear()===y}).sort((a,b)=>b.date.localeCompare(a.date));
  const total=filtered.reduce((s,e)=>s+Number(e.value),0);
  const cats=["Aluguel de sala NH","Aluguel de sala POA","Material","Supervisão","Curso/formação","Transporte","Outros"];
  const byCat=cats.map(c=>({c,t:filtered.filter(e=>e.cat===c).reduce((s,e)=>s+Number(e.value),0)})).filter(x=>x.t>0);
  document.getElementById("exp-summary").innerHTML=`<div style="font-size:12px;color:var(--pm)">Total do período</div>
    <div style="font-size:22px;font-weight:600;color:var(--r)">${fmt(total)}</div>
    ${byCat.length?`<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">${byCat.map(x=>`<span class="pill">${x.c}: ${fmt(x.t)}</span>`).join("")}</div>`:""}`;
  document.getElementById("expenses-list").innerHTML=!filtered.length
    ?'<div style="color:#aaa;text-align:center;padding:24px">Sem despesas neste período</div>'
    :filtered.map(e=>`<div style="display:flex;align-items:center;gap:10px;background:#fff;border:.5px solid var(--pbr);border-radius:12px;padding:10px 14px;margin-bottom:8px">
      <div style="flex:1"><div style="font-size:14px;color:var(--p)">${e.desc}</div><div style="font-size:11px;color:#aaa;margin-top:2px">${e.cat} · ${new Date(e.date+"T12:00:00").toLocaleDateString("pt-BR")}</div></div>
      <div style="font-size:15px;font-weight:600;color:var(--r)">${fmt(e.value)}</div>
      <button class="del-btn" onclick="delExpense('${e._id}')">×</button>
    </div>`).join("");
}
window.renderExpenses=renderExpenses;
window.saveExpense=async function(){
  const desc=document.getElementById("e-desc").value.trim();
  const value=document.getElementById("e-value").value;
  const date=document.getElementById("e-date").value;
  if(!desc||!value||!date){alert("Preencha todos os campos.");return;}
  await addDoc2("expenses",{desc,cat:document.getElementById("e-cat").value,date,value:Number(value)});
  document.getElementById("e-desc").value="";document.getElementById("e-value").value="";document.getElementById("e-date").value="";
  toggleForm("eform");renderExpenses();
}
window.delExpense=async function(id){if(!confirm("Remover despesa?"))return;await deleteDoc2("expenses",id);renderExpenses();}

// REPORTS
function renderReports(){
  initFilters("r-filter-month","r-filter-year");
  const m=Number(document.getElementById("r-filter-month").value);
  const y=Number(document.getElementById("r-filter-year").value);
  const confirmed=DB.appts.filter(a=>{const d=new Date(a.date+"T12:00:00");return a.confirmed&&d.getMonth()===m&&d.getFullYear()===y});
  const totalRec=confirmed.reduce((s,a)=>s+Number(a.value||0),0);
  document.getElementById("report-summary").innerHTML=`<div class="grid2" style="margin-bottom:0">
    <div><div style="font-size:11px;color:var(--pm)">Sessões realizadas</div><div style="font-size:20px;font-weight:600;color:var(--p)">${confirmed.length}</div></div>
    <div><div style="font-size:11px;color:var(--pm)">Total realizado</div><div style="font-size:20px;font-weight:600;color:var(--g)">${fmt(totalRec)}</div></div>
  </div>`;
  const byPat={};confirmed.forEach(a=>{if(!byPat[a.patient])byPat[a.patient]=[];byPat[a.patient].push(a);});
  const el=document.getElementById("report-list");
  if(!Object.keys(byPat).length){el.innerHTML='<div style="color:#aaa;text-align:center;padding:24px">Sem sessões confirmadas neste período</div>';return;}
  el.innerHTML=Object.keys(byPat).sort().map(name=>{
    const sessions=byPat[name].sort((a,b)=>a.date.localeCompare(b.date));
    const total=sessions.reduce((s,a)=>s+Number(a.value||0),0);
    const pat=DB.patients.find(p=>p.name===name);
    const expected=pat&&pat.type!=="avaliacao"?Number(pat.value)*(pat.freq||4):null;
    const sid="rep_"+name.replace(/\W/g,"_");
    return`<div class="report-patient">
      <div class="report-header" onclick="toggleReport('${sid}')">
        <div>
          <div style="font-weight:600;font-size:14px;color:var(--p)">${name}</div>
          <div style="font-size:12px;color:var(--pm);margin-top:2px">${sessions.length} sessão(ões) · ${fmt(total)}</div>
        </div>
        <div style="text-align:right">
          ${expected!==null?`<div style="font-size:11px;color:#aaa">Esperado: ${fmt(expected)}</div><div style="font-size:12px;font-weight:600;color:${total>=expected?"var(--g)":"var(--r)"}">${total>=expected?"✓ Em dia":"Pendente"}</div>`:""}
          <div style="font-size:18px;color:var(--pm);margin-top:4px">›</div>
        </div>
      </div>
      <div class="report-body" id="${sid}" style="display:none">
        ${sessions.map(s=>`<div class="session-row">
          <span>${new Date(s.date+"T12:00:00").toLocaleDateString("pt-BR")} ${s.time}</span>
          <span>${s.mode||""}</span>
          <span style="font-weight:600">${fmt(s.value||0)}</span>
        </div>`).join("")}
        <div style="margin-top:8px;padding-top:8px;border-top:.5px solid #f0eeff;display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:var(--p)">
          <span>Total</span><span>${fmt(total)}</span>
        </div>
      </div>
    </div>`;
  }).join("");
}
window.renderReports=renderReports;
window.toggleReport=function(id){const el=document.getElementById(id);el.style.display=el.style.display==="none"?"block":"none";}

document.getElementById("a-date").value=dateStr(now);
document.getElementById("e-date").value=dateStr(now);
</script>
